<!-- @dsCard group="Colors" viewport="700x180" name="Brass — accent" subtitle="The single art-deco accent, used sparingly" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--paper-50); font-family:var(--font-body); }
  .row { display:flex; gap:0; border:1px solid var(--ink-200); border-radius:var(--radius-md); overflow:hidden; }
  .sw { flex:1; height:96px; display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; }
  .sw span { font-family:var(--font-display); font-size:10px; letter-spacing:.08em; }
  .meta { margin-top:10px; font-family:var(--font-display); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-500); }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--brass-700)"><span style="color:#fff">700</span></div>
  <div class="sw" style="background:var(--brass-600)"><span style="color:#fff">600</span></div>
  <div class="sw" style="background:var(--brass-500)"><span style="color:var(--ink-900)">500</span></div>
  <div class="sw" style="background:var(--brass-400)"><span style="color:var(--ink-900)">400</span></div>
  <div class="sw" style="background:var(--brass-300)"><span style="color:var(--ink-900)">300</span></div>
  <div class="sw" style="background:var(--brass-200)"><span style="color:var(--ink-900)">200</span></div>
  <div class="sw" style="background:var(--brass-100)"><span style="color:var(--ink-900)">100</span></div>
</div>
<div class="meta">--color-accent = brass-500 (#B68F4E) · hover/link = brass-700 · soft fills = brass-100</div>
</body></html>
